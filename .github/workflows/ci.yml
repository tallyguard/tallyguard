name: CI

# Public repo: Actions are free, so gate every push to main and every pull request (plus
# on-demand). Runs typecheck/lint/format:check/test/build + the benchmark regression scorer.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Least privilege by default; jobs elevate only what they need (security hardening).
permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node: [22, 24] # the live LTS lines (feedback-4 Section B)
    steps:
      # Third-party actions are pinned to commit SHAs (supply-chain hardening, D047).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: npm run build
      - run: node tools/benchmark/score.mjs # detection/FP regression gate
