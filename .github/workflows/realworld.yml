name: Real-repo validation

# Network-dependent (clones real repos at pinned SHAs), so it runs on a schedule and on
# demand rather than on every push, to keep the per-commit CI fast and deterministic.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # weekly

permissions:
  contents: read

jobs:
  realworld:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to commit SHAs (supply-chain hardening, D047).
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run realworld
