name: Real-repo validation

# Network-dependent (clones real repos at pinned SHAs), so it runs on a schedule and on
# demand rather than on every push, to keep the per-commit CI fast and deterministic.
on:
  workflow_dispatch:
  schedule:
    - cron: "0 7 * * 1" # weekly

permissions:
  contents: read

jobs:
  realworld:
    runs-on: ubuntu-latest
    steps:
      # Third-party actions pinned to commit SHAs (supply-chain hardening, D047).
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run realworld
