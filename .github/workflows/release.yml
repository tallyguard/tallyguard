name: Release (npm publish)

# Publishes `tallyguard` to npm when a v* tag is pushed, using npm trusted publishing
# (OIDC, no NPM_TOKEN stored) with build provenance. The one-time npmjs.com setup and the
# release steps are in docs/RELEASE.md. The full gate runs again here before publishing.
on:
  push:
    tags: ["v*"]

permissions:
  contents: read
  id-token: write # required for npm trusted publishing / provenance (OIDC)

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          registry-url: "https://registry.npmjs.org"
      - run: npm install -g npm@latest # OIDC trusted publishing needs a recent npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run format:check
      - run: npm test
      - run: node tools/benchmark/score.mjs # detection/FP gate before any release
      - run: npm run build
      # Fail loudly if the tag does not match package.json version (avoids a mis-tagged release).
      - run: |
          PKG="v$(node -p "require('./package.json').version")"
          TAG="${GITHUB_REF_NAME}"
          echo "package=$PKG tag=$TAG"
          [ "$PKG" = "$TAG" ] || { echo "::error::tag $TAG does not match package.json $PKG"; exit 1; }
      - run: npm publish --provenance --access public
